version: '3.8'

services:
  # -----------------------------------
  # 1. DB (MySQL) 서비스 설정
  # -----------------------------------
  mysql-db:
    image: mysql:8.0
    container_name: laundry-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      # 주신 정보를 바탕으로 설정한 DB 접속 정보입니다.
      MYSQL_ROOT_PASSWORD: 'Dktnxk1004!'
      MYSQL_DATABASE: 'laundry_db'
    volumes:
      - mysql-data:/var/lib/mysql

  # -----------------------------------
  # 2. 앱 (Spring Boot + React 통합) 서비스 설정
  # -----------------------------------
  b2b-app:
    build: .
    container_name: laundry-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    environment:
      # 앱 내부의 localhost를 도커 네트워크 내부 주소인 mysql-db로 덮어씌웁니다.
      SPRING_DATASOURCE_URL: jdbc:p6spy:mysql://mysql-db:3306/laundry_db?serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 'Dktnxk1004!'
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.p6spy.engine.spy.P6SpyDriver
      
      # JWT 및 메일 설정 정보 유지
      JWT_SECRET: 'MySuperSecretKeyForLaundryB2BManagerProjectDontShare'
      SPRING_MAIL_USERNAME: 'uoco91@gmail.com'
      SPRING_MAIL_PASSWORD: 'srggqqxlaqqvbthb'
      
      # JPA 설정
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: 'false'

volumes:
  mysql-data: